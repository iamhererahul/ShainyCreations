<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shainy Creation – Products</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/products.css">
</head>
<body>
<div id="sidebar-container"></div>
<div class="main">
  <div id="topbar-container"></div>
  <div class="page-content">

    <div class="page-header">
      <h1 class="page-heading">Products</h1>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="openModal('importModal')">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Import
        </button>
        <button class="btn btn-primary" onclick="openAddProduct()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Product
        </button>
      </div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" data-tab="all">All <span id="tab-all-count" class="tab-count">12</span></button>
      <button class="tab-btn" data-tab="Active">Active <span id="tab-active-count" class="tab-count">10</span></button>
      <button class="tab-btn" data-tab="On Hold">On Hold <span id="tab-hold-count" class="tab-count">1</span></button>
      <button class="tab-btn" data-tab="Draft">Draft <span id="tab-draft-count" class="tab-count">1</span></button>
    </div>

    <div class="filter-row">
      <input class="filter-input" placeholder="Search products…" id="prod-search" oninput="filterProducts()">
      <select class="filter-select" id="prod-cat" onchange="filterProducts()">
        <option value="">All Categories</option>
        <option>Frocks</option><option>Gowns</option><option>Tutus</option>
      </select>
      <select class="filter-select" id="prod-sort" onchange="filterProducts()">
        <option>Newest</option><option>Price: Low-High</option><option>Price: High-Low</option><option>Best Selling</option>
      </select>
    </div>

    <div class="card" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="prod-select-all" onchange="selectAllProducts(this)"></th>
              <th>Product</th><th>SKU</th><th>Price</th><th>Stock</th><th>Status</th><th>Sales</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-table-body"></tbody>
        </table>
      </div>
    </div>

    <div class="table-footer">
      <div id="bulk-actions" class="bulk-actions" style="display:none">
        <button class="btn btn-outline btn-sm" onclick="bulkAction('hide')">Hide Selected</button>
        <button class="btn btn-outline btn-sm" onclick="bulkAction('show')">Show Selected</button>
        <button class="btn btn-danger btn-sm" onclick="bulkAction('remove')">Remove Selected</button>
      </div>
      <span class="text-soft text-sm ml-auto" id="prod-count">12 products total</span>
    </div>
  </div>
</div>

<!-- Add/Edit Product Modal -->
<div class="modal-overlay" id="addProductModal">
  <div class="modal modal-xl">
    <div class="modal-header">
      <div class="modal-title" id="product-modal-title">Add New Product</div>
      <button class="modal-close" onclick="closeModal('addProductModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-prod-id">
      <div class="form-2col">
        <div class="form-group"><label class="form-label">Product Name *</label><input class="form-input" id="new-prod-name" placeholder="e.g. Rosabay Belle Frock"></div>
        <div class="form-group"><label class="form-label">SKU</label><input class="form-input" id="new-prod-sku" placeholder="SC-RBF-001"></div>
      </div>
      <div class="form-2col">
        <div class="form-group"><label class="form-label">Price (₹) *</label><input class="form-input" id="new-prod-price" type="number" placeholder="1680"></div>
        <div class="form-group"><label class="form-label">Compare At Price (₹)</label><input class="form-input" id="new-prod-compare" type="number" placeholder="2100"></div>
      </div>
      <div class="form-3col">
        <div class="form-group"><label class="form-label">Category</label>
          <select class="form-select" id="new-prod-cat"><option>Frocks</option><option>Gowns</option><option>Tutus</option><option>Sets</option></select>
        </div>
        <div class="form-group"><label class="form-label">Age Group</label>
          <select class="form-select" id="new-prod-age"><option>0–1 Yrs</option><option>1–3 Yrs</option><option>3–6 Yrs</option><option>6–10 Yrs</option><option>10–14 Yrs</option></select>
        </div>
        <div class="form-group"><label class="form-label">Stock Qty</label><input class="form-input" id="new-prod-stock" type="number" placeholder="50"></div>
      </div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="new-prod-desc" placeholder="Describe the product…"></textarea></div>
      <div class="form-group"><label class="form-label">Tags (comma-separated)</label><input class="form-input" id="new-prod-tags" placeholder="princess, birthday, pink, cotton"></div>
      <div class="form-2col">
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-select" id="new-prod-status"><option>Active</option><option>Draft</option><option>On Hold</option></select>
        </div>
        <div class="form-group"><label class="form-label">Featured</label>
          <div class="toggle-wrap" style="margin-top:10px"><label class="toggle"><input type="checkbox" id="new-prod-featured"><span class="toggle-slider"></span></label><span style="font-size:12px">Show as featured product</span></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Product Images <span class="text-soft">(images managed via Content Library)</span></label>
        <div class="upload-zone" id="prod-upload-zone" onclick="triggerUpload('prod-file-input')">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <p>Drag & drop images here or <strong>browse files</strong></p>
          <p style="font-size:10px;margin-top:4px">PNG, JPG up to 10MB</p>
        </div>
        <input type="file" id="prod-file-input" multiple accept="image/*" style="display:none" onchange="handleProductImages(this)">
        <div id="prod-image-preview" class="image-preview-row"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addProductModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Import Products</div><button class="modal-close" onclick="closeModal('importModal')">×</button></div>
    <div class="modal-body">
      <div class="upload-zone" onclick="triggerUpload('import-file')">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>Upload a <strong>CSV file</strong> to import products in bulk</p>
        <p style="font-size:10px;margin-top:4px">Download template first to see required columns</p>
      </div>
      <input type="file" id="import-file" accept=".csv" style="display:none">
      <button class="btn btn-outline btn-sm" style="margin-top:12px" onclick="showToast('📥 Template downloaded!')">Download CSV Template</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('importModal')">Cancel</button>
      <button class="btn btn-primary" onclick="showToast('✓ Products imported!');closeModal('importModal')">Import</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span id="toast-msg">Done!</span></div>

<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script src="../js/products.js"></script>
</body>
</html>
