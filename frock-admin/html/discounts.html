<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shainy Creation – Discounts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/discounts.css">
</head>
<body>
<div id="sidebar-container"></div>
<div class="main">
  <div id="topbar-container"></div>
  <div class="page-content">

    <div class="page-header">
      <h1 class="page-heading">Discounts & Coupons</h1>
      <button class="btn btn-primary" onclick="openAddDiscount()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Create Discount
      </button>
    </div>

    <!-- Stats -->
    <div class="discount-stats-grid">
      <div class="mini-stat"><div class="mini-stat-label">Total Coupons</div><div class="mini-stat-val" id="disc-total">0</div></div>
      <div class="mini-stat green"><div class="mini-stat-label">Active</div><div class="mini-stat-val" id="disc-active-count">0</div></div>
      <div class="mini-stat red"><div class="mini-stat-label">Expired</div><div class="mini-stat-val" id="disc-expired">0</div></div>
      <div class="mini-stat" style="--accent:var(--gold)"><div class="mini-stat-label">Total Uses</div><div class="mini-stat-val" id="disc-uses">0</div></div>
    </div>

    <div class="card" style="padding:0">
      <div class="filter-row" style="padding:14px 16px">
        <input class="filter-input" placeholder="Search discount codes…" id="disc-search" oninput="filterDiscounts()">
        <select class="filter-select" id="disc-type-filter" onchange="filterDiscounts()">
          <option value="">All Types</option><option>Percentage</option><option>Fixed Amount</option><option>Free Shipping</option>
        </select>
        <select class="filter-select" id="disc-status-filter" onchange="filterDiscounts()">
          <option value="">All Statuses</option><option>Active</option><option>Inactive</option><option>Expired</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Code</th><th>Type</th><th>Value</th><th>Uses / Limit</th><th>Min Order</th><th>Valid Until</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="discounts-table"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Discount Modal -->
<div class="modal-overlay" id="addDiscountModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="discount-modal-title">Create Discount</div>
      <button class="modal-close" onclick="closeModal('addDiscountModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-disc-code-original">
      <div class="form-group">
        <label class="form-label">Discount Code *</label>
        <div style="display:flex;gap:8px">
          <input class="form-input" id="disc-code" placeholder="e.g. PRINCESS20" style="text-transform:uppercase">
          <button class="btn btn-outline btn-sm" onclick="genCode()" style="white-space:nowrap">Generate</button>
        </div>
        <div class="form-hint">Customers will enter this code at checkout</div>
      </div>
      <div class="form-2col">
        <div class="form-group">
          <label class="form-label">Discount Type</label>
          <select class="form-select" id="disc-type" onchange="toggleDiscountValue()">
            <option>Percentage (%)</option><option>Fixed Amount (₹)</option><option>Free Shipping</option>
          </select>
        </div>
        <div class="form-group" id="disc-value-group">
          <label class="form-label">Value</label>
          <input class="form-input" id="disc-value" placeholder="e.g. 20" type="number">
        </div>
      </div>
      <div class="form-2col">
        <div class="form-group"><label class="form-label">Minimum Order Value (₹)</label><input class="form-input" id="disc-min" placeholder="e.g. 1000" type="number"></div>
        <div class="form-group"><label class="form-label">Usage Limit (leave blank = unlimited)</label><input class="form-input" id="disc-limit" placeholder="e.g. 100" type="number"></div>
      </div>
      <div class="form-2col">
        <div class="form-group"><label class="form-label">Start Date</label><input class="form-input" id="disc-start" type="date"></div>
        <div class="form-group"><label class="form-label">End Date</label><input class="form-input" id="disc-end" type="date"></div>
      </div>
      <div class="form-group"><label class="form-label">Applies To</label>
        <select class="form-select" id="disc-applies">
          <option>All Products</option><option>Frocks Only</option><option>Gowns Only</option><option>First Order Only</option>
        </select>
      </div>
      <div class="form-group">
        <div class="toggle-wrap"><label class="toggle"><input type="checkbox" id="disc-active" checked><span class="toggle-slider"></span></label><span style="font-size:12px">Activate immediately</span></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addDiscountModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDiscount()">Save Discount</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span id="toast-msg">Done!</span></div>

<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script src="../js/discounts.js"></script>
</body>
</html>
