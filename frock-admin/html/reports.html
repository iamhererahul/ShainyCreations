<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shainy Creation – Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/reports.css">
</head>
<body>
<div id="sidebar-container"></div>
<div class="main">
  <div id="topbar-container"></div>
  <div class="page-content">

    <div class="page-header">
      <div>
        <h1 class="page-heading">Reports</h1>
        <p class="text-soft text-sm">User-submitted reports and complaints</p>
      </div>
      <button class="btn btn-outline btn-sm" onclick="exportReports()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export
      </button>
    </div>

    <!-- Stats -->
    <div class="report-stats-grid">
      <div class="mini-stat"><div class="mini-stat-label">Total Reports</div><div class="mini-stat-val" id="rp-total">0</div></div>
      <div class="mini-stat red"><div class="mini-stat-label">Open</div><div class="mini-stat-val" id="rp-open">0</div></div>
      <div class="mini-stat orange"><div class="mini-stat-label">In Progress</div><div class="mini-stat-val" id="rp-progress">0</div></div>
      <div class="mini-stat green"><div class="mini-stat-label">Resolved</div><div class="mini-stat-val" id="rp-resolved">0</div></div>
    </div>

    <div class="filter-row">
      <input class="filter-input" placeholder="Search reports…" id="rp-search" oninput="filterReports()">
      <select class="filter-select" id="rp-type" onchange="filterReports()">
        <option value="">All Types</option>
        <option>Wrong Item Received</option><option>Damaged Product</option><option>Missing Item</option><option>Payment Issue</option><option>Delivery Problem</option><option>Other</option>
      </select>
      <select class="filter-select" id="rp-status" onchange="filterReports()">
        <option value="">All Statuses</option>
        <option>Open</option><option>In Progress</option><option>Resolved</option><option>Closed</option>
      </select>
      <select class="filter-select" id="rp-priority" onchange="filterReports()">
        <option value="">All Priorities</option>
        <option>High</option><option>Medium</option><option>Low</option>
      </select>
      <select class="filter-select" id="rp-sort" onchange="filterReports()">
        <option>Newest First</option><option>Oldest First</option><option>Priority: High First</option>
      </select>
    </div>

    <div class="card" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Report ID</th><th>Customer</th><th>Order</th><th>Type</th><th>Priority</th><th>Date</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="reports-table"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Report Detail Modal -->
<div class="modal-overlay" id="reportDetailModal">
  <div class="modal modal-xl">
    <div class="modal-header">
      <div class="modal-title" id="rp-modal-title">Report Details</div>
      <button class="modal-close" onclick="closeModal('reportDetailModal')">×</button>
    </div>
    <div class="modal-body" id="rp-modal-body"></div>
    <div class="modal-footer">
      <div style="display:flex;gap:8px;flex:1">
        <select class="form-select" id="rp-new-status" style="max-width:180px">
          <option>Open</option><option>In Progress</option><option>Resolved</option><option>Closed</option>
        </select>
        <input class="form-input" id="rp-tracking" placeholder="Tracking / Resolution notes" style="flex:1">
      </div>
      <button class="btn btn-outline" onclick="closeModal('reportDetailModal')">Close</button>
      <button class="btn btn-primary" onclick="updateReport()">Update Report</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span id="toast-msg">Done!</span></div>

<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script src="../js/reports.js"></script>
</body>
</html>
