<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shainy Creation – Bulk Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/bulk-orders.css">
</head>
<body>
<div id="sidebar-container"></div>
<div class="main">
  <div id="topbar-container"></div>
  <div class="page-content">

    <div class="page-header">
      <div>
        <h1 class="page-heading">Bulk Orders</h1>
        <p class="text-soft text-sm">Wholesale and large volume orders from website</p>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="exportBulkCSV()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export CSV
        </button>
        <button class="btn btn-primary btn-sm" onclick="printAllBulkLabels()">
          <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Print All Labels
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="bulk-stats-grid">
      <div class="mini-stat"><div class="mini-stat-label">Total Bulk Orders</div><div class="mini-stat-val">48</div></div>
      <div class="mini-stat orange"><div class="mini-stat-label">Awaiting Approval</div><div class="mini-stat-val">6</div></div>
      <div class="mini-stat green"><div class="mini-stat-label">Processing</div><div class="mini-stat-val">12</div></div>
      <div class="mini-stat" style="--accent:var(--rose)"><div class="mini-stat-label">Total Value</div><div class="mini-stat-val">₹8,42,000</div></div>
    </div>

    <div class="filter-row">
      <input class="filter-input" placeholder="Search by company, order ID…" id="bulk-search" oninput="filterBulkOrders()">
      <select class="filter-select" id="bulk-status-filter" onchange="filterBulkOrders()">
        <option value="">All Statuses</option>
        <option>Pending Approval</option><option>Approved</option><option>Processing</option><option>Shipped</option><option>Delivered</option><option>Cancelled</option>
      </select>
      <select class="filter-select" id="bulk-sort" onchange="filterBulkOrders()">
        <option>Newest First</option><option>Oldest First</option><option>Highest Value</option>
      </select>
    </div>

    <div class="card" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="bulk-select-all" onchange="selectAllBulk(this)"></th>
              <th>Order ID</th><th>Company / Contact</th><th>Products</th><th>Qty</th><th>Total Value</th><th>Date</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="bulk-orders-body"></tbody>
        </table>
      </div>
    </div>

    <div class="table-footer">
      <div id="bulk-bulk-actions" class="bulk-actions" style="display:none">
        <button class="btn btn-outline btn-sm" onclick="bulkLabelPrint()">Print Labels</button>
        <button class="btn btn-rose btn-sm" onclick="bulkApprove()">Approve Selected</button>
      </div>
      <span class="text-soft text-sm ml-auto">Showing <span id="bulk-showing">all</span> bulk orders</span>
    </div>
  </div>
</div>

<!-- Bulk Order Detail Modal -->
<div class="modal-overlay" id="bulkOrderModal">
  <div class="modal modal-xl">
    <div class="modal-header">
      <div class="modal-title" id="bulk-modal-title">Bulk Order Details</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-outline btn-sm" onclick="printBulkLabel(currentBulkId)">
          <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Print Label
        </button>
        <button class="modal-close" onclick="closeModal('bulkOrderModal')">×</button>
      </div>
    </div>
    <div class="modal-body" id="bulk-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="cancelBulkOrder()">Cancel Order</button>
      <button class="btn btn-outline" onclick="closeModal('bulkOrderModal')">Close</button>
      <button class="btn btn-primary" onclick="approveBulkOrder()">Approve & Process</button>
    </div>
  </div>
</div>

<!-- Label Print Modal -->
<div class="modal-overlay" id="bulkLabelModal">
  <div class="modal" style="width:min(520px,96vw)">
    <div class="modal-header">
      <div class="modal-title">Bulk Shipping Label</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-primary btn-sm" onclick="window.print()">Print</button>
        <button class="modal-close" onclick="closeModal('bulkLabelModal')">×</button>
      </div>
    </div>
    <div class="modal-body"><div id="bulk-label-content" class="label-sheet bulk-label"></div></div>
  </div>
</div>

<div class="toast" id="toast"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span id="toast-msg">Done!</span></div>

<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script src="../js/bulk-orders.js"></script>
</body>
</html>
